
tailor_resume:
  description: >
    Rewrite the candidate's resume to specifically target this job posting.

    Candidate profile: {candidate_profile}
    Target job: {job_title} at {company_name}
    Job description: {job_description}
    Job requirements: {job_requirements}

    Optimize the resume by:
    1. Rewriting the professional summary to position the candidate for this specific role
    2. Reordering skills to lead with the most relevant ones for this job
    3. Rewriting experience bullet points to emphasize achievements that map to job requirements
    4. Incorporating key terms from the job description for ATS optimization
    5. Keeping all information truthful — enhance presentation, don't fabricate

    Use the file_writer tool to save the tailored resume as:
    {company_name}_{job_title}_resume.md|||<the full tailored resume content>
  expected_output: >
    A professionally tailored resume in markdown format, optimized for the target job's
    ATS keywords and requirements. The resume should be saved to the output directory.
  agent: resume_tailor

write_cover_letter:
  description: >
    Write a personalized cover letter for this specific job application.

    Candidate: {candidate_name}
    Target: {job_title} at {company_name}
    Job description: {job_description}
    Matching skills: {matching_skills}

    The cover letter should:
    1. Open with a strong hook showing genuine interest in the company/role
    2. Highlight 2-3 specific experiences that directly address key job requirements
    3. Demonstrate knowledge of the company or industry
    4. Close with enthusiasm and a clear call to action
    5. Be 3-4 paragraphs, professional but personable

    Use the file_writer tool to save the cover letter as:
    {company_name}_{job_title}_cover_letter.md|||<the full cover letter content>
  expected_output: >
    A compelling, personalized cover letter in markdown format, saved to the output directory.
  agent: cover_letter_writer
  context:
    - tailor_resume

submit_application:
  description: >
    Submit the job application for {job_title} at {company_name}.

    Application details:
    - Job URL: {job_url}
    - Platform: {platform}
    - Candidate name: {candidate_name}
    - Candidate email: {candidate_email}
    - Candidate phone: {candidate_phone}
    - Resume path: {resume_path}
    - Cover letter: Use the cover letter text from the previous task

    Use the job_apply tool with a JSON input containing all these details.
    If the application is blocked (CAPTCHA, login required), report the issue clearly.
    If successful, confirm the submission.
  expected_output: >
    A JSON result with the application status (submitted, failed, or blocked),
    any error messages, and the path to the submission screenshot.
  agent: job_applicant
  context:
    - tailor_resume
    - write_cover_letter
