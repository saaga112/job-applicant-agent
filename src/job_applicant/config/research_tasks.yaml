parse_resume:
  description: >
    Parse the candidate's resume from the file at: {resume_path}

    Use the resume_parser tool to extract the text content, then structure it into a
    complete candidate profile including:
    - Full name and contact information (email, phone, location, LinkedIn URL)
    - Professional summary
    - Complete list of technical and soft skills
    - All work experiences with company, title, dates, and bullet points
    - Education details
    - Certifications

    Be thorough — capture every detail from the resume.
  expected_output: >
    A complete structured candidate profile in JSON format with all fields populated
    from the resume content.
  agent: resume_parser
  output_file: output/candidate_profile.json

search_jobs:
  description: >
    Search for job postings matching the candidate's profile across all specified platforms.

    Search criteria:
    - Keywords: {keywords}
    - Locations: {locations}
    - Platforms: {platforms}
    - Job types: {job_types}

    Use the job_search tool with a JSON input containing these search parameters.
    Collect job postings from each platform with title, company, location, description, and URL.
    Filter out any error results or empty postings.
  expected_output: >
    A JSON list of job postings found across all platforms, each with title, company,
    location, description, requirements, URL, and platform source.
  agent: job_searcher
  context:
    - parse_resume
  output_file: output/job_listings.json

match_jobs:
  description: >
    Analyze each job posting against the candidate's profile and produce a ranked match list.

    For each job posting found:
    1. Compare the candidate's skills against job requirements
    2. Calculate a fit score from 0.0 (no match) to 1.0 (perfect match)
    3. List matching skills and missing skills
    4. Provide a recommendation: Apply (score >= 0.7), Maybe (0.4-0.69), Skip (< 0.4)
    5. Write a brief rationale explaining the assessment

    Rank all jobs by score, highest first. Only include jobs with recommendation "Apply" or "Maybe".
  expected_output: >
    A ranked JSON list of job matches, each containing: the job posting details, match score,
    matching skills, missing skills, recommendation (Apply/Maybe/Skip), and rationale.
  agent: job_matcher
  context:
    - parse_resume
    - search_jobs
  output_file: output/matched_jobs.json

